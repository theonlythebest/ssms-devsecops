# ---------------------------------------------------------------------------
# SSMS DevSecOps inventory
# ---------------------------------------------------------------------------
# Filled in directly with the EC2 instance Terraform provisions.
# If Terraform recreates the box, just update the ansible_host line below
# (or generate this file from Terraform output, see README at the bottom).
# ---------------------------------------------------------------------------

[ssms]
ssms-prod ansible_host=13.39.86.185

[ssms:vars]
ansible_user                     = ubuntu
ansible_ssh_private_key_file     = ~/.ssh/ssms-key.pem
ansible_python_interpreter       = /usr/bin/python3
ansible_ssh_common_args          = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
