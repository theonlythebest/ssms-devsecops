---
# ---------------------------------------------------------------------------
# Install Docker Engine + Compose v2 plugin on Ubuntu.
# Idempotent: skips apt key/repo work if already configured.
# ---------------------------------------------------------------------------

- name: Ensure /etc/apt/keyrings exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker GPG key (dearmored)
  ansible.builtin.shell: |
    set -euo pipefail
    curl -fsSL {{ docker_apt_repo_url }}/gpg \
      | gpg --dearmor -o {{ docker_apt_keyring }}
    chmod a+r {{ docker_apt_keyring }}
  args:
    creates: "{{ docker_apt_keyring }}"

- name: Add Docker apt repository
  ansible.builtin.copy:
    dest: "{{ docker_apt_repo_list }}"
    mode: "0644"
    content: |
      deb [arch={{ docker_apt_arch }} signed-by={{ docker_apt_keyring }}] {{ docker_apt_repo_url }} {{ docker_apt_release }} stable
  notify: restart docker

- name: Refresh apt cache (post-repo)
  ansible.builtin.apt:
    update_cache: true

- name: Install Docker Engine + Compose plugin
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: present

- name: Ensure docker service is enabled and running
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Add users to the docker group (no sudo needed)
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_users }}"

- name: Verify Docker is callable
  ansible.builtin.command: docker --version
  register: docker_version
  changed_when: false

- name: Verify Compose v2 plugin is callable
  ansible.builtin.command: docker compose version
  register: compose_version
  changed_when: false

- name: Report Docker / Compose versions
  ansible.builtin.debug:
    msg:
      - "{{ docker_version.stdout }}"
      - "{{ compose_version.stdout }}"
