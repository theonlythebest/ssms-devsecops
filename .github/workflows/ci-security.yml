# ---------------------------------------------------------------------------
# CI / SAST security pipeline
#
# Runs on every push and pull request. Combines five complementary scanners:
#   - flake8     -> style + obvious bugs
#   - Bandit     -> Python-specific security smell
#   - Semgrep    -> rules-based SAST (OWASP Top 10, secrets, etc.)
#   - pip-audit  -> known CVEs in Python deps (advisory DB)
#   - Gitleaks   -> committed secrets / credentials scanner
#
# All security tools publish SARIF to the GitHub Security tab so findings
# land in the repo's "Code scanning" UI, and JSON reports are uploaded as
# build artifacts for the PR reviewer.
# ---------------------------------------------------------------------------

name: ci-security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # required to upload SARIF
  actions: read

concurrency:
  group: ci-security-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # -----------------------------------------------------------------------
  # 1) Lint + light correctness checks (no security gates here)
  # -----------------------------------------------------------------------
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install lint deps
        run: pip install --upgrade pip flake8

      - name: flake8
        run: flake8 backend/app

  # -----------------------------------------------------------------------
  # 2) Bandit -- Python AST security smells
  # -----------------------------------------------------------------------
  bandit:
    name: Bandit (Python SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit (+ SARIF formatter)
        run: pip install --upgrade pip "bandit[sarif]==1.7.10"

      - name: Run Bandit (JSON for humans)
        # B311 = pseudo-random is fine for seeding demo data
        run: bandit -r backend/app -s B311 -f json -o bandit.json
        continue-on-error: true

      - name: Run Bandit (SARIF for GitHub)
        run: bandit -r backend/app -s B311 -f sarif -o bandit.sarif
        continue-on-error: true

      - name: Upload Bandit SARIF to code-scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit.sarif
          category: bandit

      - name: Upload Bandit JSON artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit.json

      - name: Fail on Bandit HIGH severity
        run: |
          set -e
          high=$(python -c "import json; d=json.load(open('bandit.json')); print(sum(1 for r in d.get('results',[]) if r.get('issue_severity','').upper()=='HIGH'))")
          echo "Bandit HIGH-severity findings: $high"
          if [ "$high" != "0" ]; then
            echo "::error::Bandit reported $high HIGH-severity findings -- failing the build."
            exit 1
          fi

  # -----------------------------------------------------------------------
  # 3) Semgrep -- multi-language rules-based SAST
  # -----------------------------------------------------------------------
  semgrep:
    name: Semgrep (SAST)
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep:latest
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep scan (SARIF)
        run: |
          semgrep ci \
            --config p/ci \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/python \
            --config p/dockerfile \
            --sarif --output=semgrep.sarif || true
        env:
          # Optional: set SEMGREP_APP_TOKEN as a repo secret to push findings
          # to a Semgrep AppSec Platform org.
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep SARIF to code-scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload Semgrep artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep.sarif

  # -----------------------------------------------------------------------
  # 4) pip-audit -- known CVEs in Python dependencies
  # -----------------------------------------------------------------------
  pip-audit:
    name: pip-audit (deps CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install --upgrade pip pip-audit

      - name: pip-audit
        run: |
          pip-audit -r backend/requirements.txt \
            --strict \
            --format json \
            --output pip-audit.json \
            || echo "pip-audit_exit=$?" >> "$GITHUB_ENV"

      - name: Upload pip-audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit.json

      - name: Fail on dependency CVEs
        if: env.pip-audit_exit != ''
        run: |
          echo "::error::pip-audit detected vulnerable dependencies. See artifact pip-audit-report."
          exit 1

  # -----------------------------------------------------------------------
  # 5) Gitleaks -- committed secrets scanner
  # -----------------------------------------------------------------------
  gitleaks:
    name: Gitleaks (secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"
