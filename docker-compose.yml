# ---------------------------------------------------------------------------
# SSMS docker-compose
#
# Secrets are read from a .env file at repo root. Ansible renders that file
# from group_vars/all.yml. See .env.example for the contract.
#
# Hardening highlights:
#   - all containers run with no new privileges + dropped capabilities
#   - backend / frontend images already enforce non-root in their Dockerfile
#   - mariadb data is on a named volume (not bind-mounted)
#   - prometheus.yml is mounted read-only
# ---------------------------------------------------------------------------

services:
  mariadb:
    image: mariadb:11
    container_name: ssms_mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-ssms}
      MYSQL_USER:          ${MYSQL_USER:-ssmsuser}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-strongpassword}
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    networks:
      - ssms_net

  backend:
    build: ./backend
    image: ssms/backend:latest
    container_name: ssms_backend
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      DATABASE_URL:        ${DATABASE_URL:-mysql+pymysql://ssmsuser:strongpassword@mariadb:3306/ssms?charset=utf8mb4}
      JWT_SECRET:          ${JWT_SECRET:-change-me-in-production}
      JWT_ALGORITHM:       ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_MINUTES:  ${JWT_EXPIRE_MINUTES:-60}
      SEED_ON_STARTUP:     ${SEED_ON_STARTUP:-true}
    ports:
      - "8000:8000"
    volumes:
      - ./frontend:/app/frontend:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - ssms_net

  frontend:
    build: ./frontend
    image: ssms/frontend:latest
    container_name: ssms_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:8080"   # host 80 -> container 8080 (unprivileged nginx)
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - ssms_net

  prometheus:
    image: prom/prometheus
    container_name: ssms_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - backend
    security_opt:
      - no-new-privileges:true
    networks:
      - ssms_net

  grafana:
    image: grafana/grafana
    container_name: ssms_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER:     ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP:     "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    security_opt:
      - no-new-privileges:true
    networks:
      - ssms_net

volumes:
  mariadb_data:
  prometheus_data:
  grafana_data:

networks:
  ssms_net:
    driver: bridge
